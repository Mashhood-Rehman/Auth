name: Backend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      # Trigger ONLY if websocket-related files change
      - 'websockets/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'websockets/**'
      - '.github/workflows/backend.yml'

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          cd websockets
          npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Builds the socket server docker container
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./websockets
          file: ./websockets/Dockerfile
          push: false
          tags: websocket-server:latest